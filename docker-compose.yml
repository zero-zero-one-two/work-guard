version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  embedder:
    build:
      context: ./rag-pipeline
      dockerfile: Dockerfile
    container_name: workguard_embedder
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=workguard_docs
      - DOCUMENTS_DIR=/app/documents
      - CHUNK_SIZE=1200
      - CHUNK_OVERLAP=320
      - DENSE_MODEL=solar-embedding-1-large-passage
      - SPARSE_MODEL=Qdrant/bm25
      - DENSE_DIM=4096
      - BATCH_SIZE=32
      - LOG_LEVEL=INFO
    depends_on:
      qdrant:
        condition: service_healthy
    restart: no
    volumes:
      - ./rag-pipeline/documents:/app/documents:ro

  server:
    build:
      context: ./workguard-server
      dockerfile: Dockerfile
    container_name: workguard_server
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DOCUMENTS_DIR=/app/documents
      - DB_PATH=/app/data/workguard.db
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./workguard-server/data:/app/data
      - ./rag-pipeline/documents:/app/documents:ro

volumes:
  qdrant_data:
